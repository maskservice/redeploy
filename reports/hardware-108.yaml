diagnostics:
- component: overlay
  severity: warning
  message: display_auto_detect=1 may conflict with manual DSI overlay
  fix: "Set display_auto_detect=0 in /boot/firmware/config.txt\n  sudo sed -i 's/^display_auto_detect=1/display_auto_detect=0/'\
    \ /boot/firmware/config.txt"
- component: dsi
  severity: info
  message: DSI display appears correctly configured (connected, backlight on)
  fix: null

