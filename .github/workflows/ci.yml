name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        use-op3: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests (REDEPLOY_USE_OP3=${{ matrix.use-op3 }})
        env:
          REDEPLOY_USE_OP3: ${{ matrix.use-op3 }}
        run: uv run pytest tests/ tests/contract/ tests/integration/ -v --tb=short
