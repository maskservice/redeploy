# iot-fleet-ota.yaml — OTA update for IoT fleet node (Raspberry Pi / Jetson)
# Inspired by doql iot-fleet example (DEPLOY: target: kubernetes + OTA workflow)
#
# Usage:
#   redeploy run examples/iot-fleet-ota.yaml --dry-run
#   redeploy run examples/iot-fleet-ota.yaml
#   redeploy run examples/iot-fleet-ota.yaml --detect   # live probe first

name: "iot-fleet node OTA"
description: "Deploy new firmware/app version to an IoT edge node (docker_full → docker_full version bump)"

source:
  strategy: docker_full
  host: pi@192.168.1.42   # edge node IP — override via redeploy.yaml
  app: iot-agent
  version: "0.4.2"
  domain: iot-node-42.local
  remote_dir: ~/iot-agent
  compose_files:
    - docker-compose.yml

target:
  strategy: docker_full
  host: pi@192.168.1.42
  app: iot-agent
  version: "0.5.0"
  domain: iot-node-42.local
  remote_dir: ~/iot-agent
  compose_files:
    - docker-compose.yml
  env_file: .env
  verify_url: http://localhost:8080/health
  verify_version: "0.5.0"

extra_steps:
  - id: pull_new_image
    action: ssh_cmd
    description: "Pull new container image before cutover"
    command: "cd ~/iot-agent && docker compose pull"
    risk: low

  - id: backup_local_db
    action: ssh_cmd
    description: "Backup SQLite telemetry DB before upgrade"
    command: "cp /var/lib/iot-agent/telemetry.db /var/lib/iot-agent/telemetry.db.bak.$(date +%Y%m%d)"
    risk: low
    rollback_command: "mv /var/lib/iot-agent/telemetry.db.bak.* /var/lib/iot-agent/telemetry.db 2>/dev/null || true"

  - id: write_version_file
    action: ssh_cmd
    description: "Write VERSION file after successful deploy"
    command: "echo '0.5.0' > ~/iot-agent/VERSION"
    risk: low

notes:
  - "Edge node must be reachable via SSH (pi@node-ip)"
  - "Use 'redeploy run --detect' to verify current docker version before upgrading"
  - "For canary rollout: run against 5% of fleet first, then full fleet"
  - "doql iot-fleet DEPLOY target: kubernetes — for large fleets use k3s-to-docker.yaml pattern"
