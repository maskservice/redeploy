# target.yaml — migrate from k3s to docker_full
# Use this when detect reveals k3s is running and stealing ports.

strategy: docker_full
app: c2004

compose_files:
  - docker-compose.vps.yml
env_file: envs/vps.env
remote_dir: ~/c2004
domain: c2004.mask.services

# k3s will be stopped automatically by the planner if conflicts detected.
# Optionally also disable host nginx if present:
stop_services: []
disable_services: []

delete_k3s_namespaces:
  - identification          # the old k3s namespace for this app

verify_url: https://c2004.mask.services/api/v1/health
verify_version: "1.0.19"
