# migration.yaml — version bump within same strategy (docker_full → docker_full)
# Usage: redeploy run examples/docker-version-bump.yaml

name: "c2004 version bump 1.0.19 → 1.0.20"
description: "Rebuild and redeploy Docker stack with new version"

source:
  strategy: docker_full
  host: root@87.106.87.183
  app: c2004
  version: "1.0.19"
  domain: c2004.mask.services
  remote_dir: ~/c2004

target:
  strategy: docker_full
  host: root@87.106.87.183
  app: c2004
  version: "1.0.20"
  domain: c2004.mask.services
  remote_dir: ~/c2004

  compose_files:
    - docker-compose.vps.yml
  env_file: envs/vps.env

  verify_url: https://c2004.mask.services/api/v1/health
  verify_version: "1.0.20"

extra_steps: []
notes: []
