stages:
  - deploy

deploy_prod:
  stage: deploy
  image: python:3.12-slim
  only:
    - tags
  before_script:
    - pip install redeploy
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H 87.106.87.183 >> ~/.ssh/known_hosts
    - echo "$VPS_ENV" > .env
    - echo "SERVICE_VERSION=${CI_COMMIT_TAG#v}" >> .env
  script:
    - redeploy run examples/12-ci-pipeline/migration.yaml --detect
  environment:
    name: production
    url: https://c2004.mask.services
