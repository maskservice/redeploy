# target.yaml — desired infrastructure state for redeploy plan
# This file describes WHERE and HOW you want the app deployed.

strategy: docker_full
app: c2004
version: "1.0.19"

compose_files:
  - docker-compose.vps.yml
env_file: envs/vps.env
remote_dir: ~/c2004
domain: c2004.mask.services

# Services to stop before deploying
stop_services: []        # e.g. [nginx] if host nginx conflicts
disable_services: []

# k3s namespaces to clean up (leave empty if k3s not in use)
delete_k3s_namespaces: []

# Verification after deploy
verify_url: https://c2004.mask.services/api/v1/health
verify_version: "1.0.19"
