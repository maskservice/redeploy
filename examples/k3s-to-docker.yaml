# migration.yaml — single file describing infrastructure migration
# Usage: redeploy run examples/k3s-to-docker.yaml [--dry-run] [--detect]

name: "k3s → docker_full (c2004 VPS)"
description: "Migrate c2004 from k3s/ingress-nginx to Docker Compose + Traefik"

# ── BEFORE (current state) ────────────────────────────────────────────────────
source:
  strategy: k3s
  host: root@87.106.87.183
  app: c2004
  version: "1.0.18"
  domain: c2004.mask.services
  remote_dir: ~/c2004

  # k3s resources to clean up when leaving this state
  delete_k3s_namespaces:
    - identification
  stop_services:
    - k3s
  disable_services:
    - k3s

# ── AFTER (desired state) ─────────────────────────────────────────────────────
target:
  strategy: docker_full
  host: root@87.106.87.183
  app: c2004
  version: "1.0.19"
  domain: c2004.mask.services
  remote_dir: ~/c2004

  compose_files:
    - docker-compose.vps.yml
  env_file: envs/vps.env

  verify_url: https://c2004.mask.services/api/v1/health
  verify_version: "1.0.19"

# ── optional manual steps appended after auto-generated ones ──────────────────
extra_steps: []

notes:
  - "k3s ingress-nginx was stealing iptables DNAT on ports 80/443 before docker-proxy"
  - "After migration Traefik Docker handles all TLS via Let's Encrypt"
