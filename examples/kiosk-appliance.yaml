# kiosk-appliance.yaml — deploy/update kiosk app on Raspberry Pi tablet
# Inspired by doql kiosk-station example (DEPLOY: target: kiosk-appliance)
#
# doql DEPLOY block generates: install-kiosk.sh + kiosk.service (systemd)
# redeploy handles the APPLY phase: copying files + restarting the service
#
# Usage:
#   redeploy run examples/kiosk-appliance.yaml --dry-run
#   redeploy run examples/kiosk-appliance.yaml

name: "kiosk-appliance deploy"
description: "Update kiosk app on Raspberry Pi 4 tablet station (Podman Quadlet rootless)"

source:
  strategy: podman_quadlet
  host: kiosk@192.168.1.100   # kiosk station IP
  app: kiosk-app
  version: "0.2.0"
  domain: localhost
  remote_dir: /var/lib/kiosk

target:
  strategy: podman_quadlet
  host: kiosk@192.168.1.100
  app: kiosk-app
  version: "0.2.1"
  domain: localhost
  remote_dir: /var/lib/kiosk
  env_file: .env
  verify_url: http://localhost:8080/health
  verify_version: "0.2.1"

extra_steps:
  - id: stop_chromium_kiosk
    action: ssh_cmd
    description: "Gracefully stop Chromium kiosk browser"
    command: "pkill -f 'chromium-browser --kiosk' 2>/dev/null || true"
    risk: low

  - id: sync_app_files
    action: rsync
    description: "Sync updated app files to kiosk"
    src: "./build/"
    dst: "/var/lib/kiosk/app/"
    risk: low
    rollback_command: "systemctl --user start kiosk-app.service"

  - id: update_quadlet_unit
    action: scp
    description: "Copy updated kiosk-app.container unit file"
    src: "./quadlet/kiosk-app.container"
    dst: "/home/kiosk/.config/containers/systemd/kiosk-app.container"
    risk: low

  - id: write_version
    action: ssh_cmd
    description: "Write new VERSION file"
    command: "echo '0.2.1' > /var/lib/kiosk/VERSION"
    risk: low

  - id: restart_chromium
    action: ssh_cmd
    description: "Restart Chromium kiosk browser pointing to new build"
    command: "DISPLAY=:0 chromium-browser --kiosk --noerrdialogs --disable-infobars --app=http://localhost:8080 &"
    risk: low

notes:
  - "doql kiosk-station: DEPLOY target: kiosk-appliance — redeploy handles the apply phase"
  - "kiosk user must have passwordless sudo for systemctl (or use rootless Quadlet)"
  - "Chromium runs in kiosk mode — no window decorations, no address bar"
  - "loginctl enable-linger kiosk  — needed for rootless Quadlet to survive SSH logout"
  - "After deploy: journalctl --user -u kiosk-app -f"
